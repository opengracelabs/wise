[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-grace-knowledge"
version = "1.0.0"
description = "Open Grace Knowledge Framework v1 — entity, place, species, heritage, collection, media, and knowledge graph registries"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "open-grace-governance",
    "open-grace-agent-registry",
    "open-grace-benchmarking",
    "open-grace-audit",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/open_grace_knowledge"]

[tool.hatch.build.targets.wheel.force-include]
"src/open_grace_knowledge/data" = "open_grace_knowledge/data"

[tool.pytest.ini_options]
testpaths = ["../../tests/open_grace"]
