[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-contracts"
version = "0.1.0"
description = "Interface contracts for WISE platform layers (JSON-LD, BagIt, RDF)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_contracts"]
