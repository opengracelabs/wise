[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-grace-registry-db"
version = "1.0.0"
description = "Open Grace registry persistence — SQLAlchemy models, Alembic migrations, YAML import/export"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "open-grace-governance",
    "open-grace-agent-registry",
    "open-grace-benchmarking",
    "open-grace-audit",
    "open-grace-knowledge",
    "open-grace-runtime",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/open_grace_registry_db"]

[tool.pytest.ini_options]
testpaths = ["../../tests/open_grace"]
markers = [
    "integration: tests requiring database connectivity",
]
