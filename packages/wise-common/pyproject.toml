[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-common"
version = "0.1.0"
description = "Shared utilities for WISE platform services"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.0",
    "structlog>=24.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_common"]
