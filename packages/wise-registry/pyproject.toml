[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-registry"
version = "0.1.0"
description = "Source Registry — Phase 1 institutional source authority (architecture-v1.0)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "wise-common",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_registry"]

[tool.pytest.ini_options]
testpaths = ["../../tests/registry"]
markers = [
    "integration: requires PostgreSQL (WISE_TEST_DATABASE_URL)",
]
