[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-grace-runtime"
version = "2.0.0"
description = "Open Grace Agent Runtime v2 — gated LangGraph execution, records, and governance integration"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "open-grace-governance",
    "open-grace-agent-registry",
    "open-grace-benchmarking",
    "open-grace-audit",
    "open-grace-knowledge",
    "open-grace-observability",
    "langgraph>=0.2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/open_grace_runtime"]

[tool.pytest.ini_options]
testpaths = ["../../tests/open_grace"]
