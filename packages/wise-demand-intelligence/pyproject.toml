[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-demand-intelligence"
version = "0.1.0"
description = "Demand Intelligence scoring and commercial readiness filters for WISE (architecture-v1.0)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/scoring"]

[tool.hatch.build.targets.wheel.force-include]
"src/filter_commercial_assets.py" = "filter_commercial_assets.py"

[tool.pytest.ini_options]
testpaths = ["../../tests/demand_intelligence"]
