metrics:
  - name: open_grace_agent_execution_latency_seconds
    type: histogram
    help: Agent execution latency in seconds
    labels:
      - agent_id
      - metric_kind
      - trace_id

  - name: open_grace_agent_execution_total
    type: counter
    help: Total agent executions
    labels:
      - agent_id
      - outcome

  - name: open_grace_capability_metric_gauge
    type: gauge
    help: Capability performance gauge
    labels:
      - capability_id
      - agent_id
      - metric_kind

  - name: open_grace_benchmark_observed_value
    type: gauge
    help: Observed benchmark metric value
    labels:
      - benchmark_id
      - agent_id
      - passed

  - name: open_grace_audit_metric_gauge
    type: gauge
    help: Audit trail metric values
    labels:
      - subject_type
      - subject_id
      - metric_kind

  - name: open_grace_cost_usd_total
    type: counter
    help: Accumulated cost in USD
    labels:
      - agent_id
      - model_id
      - cost_kind

  - name: open_grace_runtime_execution_count
    type: counter
    help: Runtime v2 graph execution count
    labels:
      - agent_id
      - run_id

  - name: open_grace_runtime_execution_success_rate
    type: gauge
    help: Runtime execution success rate (0-1)
    labels: []

  - name: open_grace_runtime_execution_latency_ms
    type: gauge
    help: Mean runtime execution latency in milliseconds
    labels: []

  - name: open_grace_runtime_benchmark_score
    type: gauge
    help: Mean observed benchmark score from runtime evaluate node
    labels:
      - benchmark_id
      - agent_id

  - name: open_grace_runtime_risk_gate_failures
    type: counter
    help: Risk gate failures in runtime v2
    labels:
      - agent_id
      - run_id

  - name: open_grace_runtime_capability_gate_failures
    type: counter
    help: Capability gate failures in runtime v2
    labels:
      - agent_id
      - run_id
