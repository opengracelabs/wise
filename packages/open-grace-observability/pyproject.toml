[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-grace-observability"
version = "1.0.0"
description = "Open Grace Observability Framework v1 — metrics, tracing, Prometheus/Grafana/Loki definitions"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "open-grace-governance",
    "open-grace-agent-registry",
    "open-grace-benchmarking",
    "open-grace-audit",
    "pyyaml>=6.0",
    "opentelemetry-api>=1.20",
]

[project.optional-dependencies]
otel = ["opentelemetry-api>=1.20"]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/open_grace_observability"]

[tool.hatch.build.targets.wheel.force-include]
"src/open_grace_observability/data" = "open_grace_observability/data"

[tool.pytest.ini_options]
testpaths = ["../../tests/open_grace"]
