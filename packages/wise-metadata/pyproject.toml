[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-metadata"
version = "0.1.0"
description = "Metadata Agent v1 — Knowledge Modeling layer (architecture-v1.0 Phase B)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "wise-registry",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "wise-common",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_metadata"]

[tool.pytest.ini_options]
testpaths = ["../../tests/metadata"]
markers = [
    "integration: requires PostgreSQL (WISE_TEST_DATABASE_URL)",
]
