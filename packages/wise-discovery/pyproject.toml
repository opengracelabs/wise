[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-discovery"
version = "0.1.0"
description = "Source Discovery Agent v1 — Discovery capability (architecture-v1.0 Phase 1)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "httpx>=0.27",
    "wise-registry",
    "wise-contracts",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "wise-common",
    "wise-reference",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_discovery"]

[tool.pytest.ini_options]
testpaths = ["../../tests/discovery"]
markers = [
    "integration: requires PostgreSQL (WISE_TEST_DATABASE_URL)",
]
