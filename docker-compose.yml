# WISE platform — local development stack
# Architecture: architecture-v1.0 (docs/architecture/canonical/)
# Engineering stack: 04-system-diagram §2.1

name: wise

x-service-env: &service-env
  WISE_ENVIRONMENT: ${WISE_ENVIRONMENT:-development}
  WISE_LOG_LEVEL: ${WISE_LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL:-postgresql://wise:wise@postgres:5432/wise}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-wise}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-wise-minio-secret}
  MINIO_BUCKET: ${MINIO_BUCKET:-wise-preservation}
  OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}

services:
  # ---------------------------------------------------------------------------
  # Data plane
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./infrastructure/docker/postgres
      dockerfile: Dockerfile
    image: wise-postgres:16-postgis-pgvector
    container_name: wise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wise}
      POSTGRES_DB: ${POSTGRES_DB:-wise}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wise} -d ${POSTGRES_DB:-wise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wise-internal

  redis:
    image: redis:7-alpine
    container_name: wise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - wise-internal

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: wise-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wise}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wise-minio-secret}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - wise-internal

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-30Z
    container_name: wise-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set wise http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing wise/$${MINIO_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wise}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wise-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-wise-preservation}
    networks:
      - wise-internal

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: wise-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wise-internal

  # ---------------------------------------------------------------------------
  # Platform services (scaffold — health endpoints only)
  # ---------------------------------------------------------------------------
  discovery-service:
    build:
      context: .
      dockerfile: services/discovery-service/Dockerfile
    container_name: wise-discovery-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wise-internal

  metadata-service:
    build:
      context: .
      dockerfile: services/metadata-service/Dockerfile
    container_name: wise-metadata-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: metadata-service
    ports:
      - "${METADATA_SERVICE_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wise-internal

  preservation-service:
    build:
      context: .
      dockerfile: services/preservation-service/Dockerfile
    container_name: wise-preservation-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: preservation-service
    ports:
      - "${PRESERVATION_SERVICE_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - wise-internal

  knowledge-graph-service:
    build:
      context: .
      dockerfile: services/knowledge-graph-service/Dockerfile
    container_name: wise-knowledge-graph-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: knowledge-graph-service
    ports:
      - "${KNOWLEDGE_GRAPH_SERVICE_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - wise-internal

  api-service:
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: wise-api-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: api-service
      DISCOVERY_SERVICE_URL: http://discovery-service:8001
      METADATA_SERVICE_URL: http://metadata-service:8002
      PRESERVATION_SERVICE_URL: http://preservation-service:8003
      KNOWLEDGE_GRAPH_SERVICE_URL: http://knowledge-graph-service:8004
      ORCHESTRATOR_SERVICE_URL: http://orchestrator-service:8005
    ports:
      - "${API_SERVICE_PORT:-8000}:8000"
    depends_on:
      - discovery-service
      - metadata-service
      - preservation-service
      - knowledge-graph-service
      - orchestrator-service
    networks:
      - wise-internal
      - wise-public

  orchestrator-service:
    build:
      context: .
      dockerfile: services/orchestrator-service/Dockerfile
    container_name: wise-orchestrator-service
    restart: unless-stopped
    environment:
      <<: *service-env
      WISE_SERVICE_NAME: orchestrator-service
      WISE_MANIFEST_ROOT: /deps/data-registry
    ports:
      - "${ORCHESTRATOR_SERVICE_PORT:-8005}:8005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wise-internal

  n8n:
    image: n8nio/n8n:1.70.3
    container_name: wise-n8n
    restart: unless-stopped
    profiles:
      - orchestration
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      N8N_DIAGNOSTICS_ENABLED: "false"
      ORCHESTRATOR_SERVICE_URL: http://orchestrator-service:8005
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infrastructure/n8n/workflows:/wise/n8n/workflows:ro
    depends_on:
      - orchestrator-service
    networks:
      - wise-internal

networks:
  wise-internal:
    driver: bridge
  wise-public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  n8n_data:
