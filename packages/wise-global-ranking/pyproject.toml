[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-global-ranking"
version = "0.1.0"
description = "Global asset ranking for WISE reference assets"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_global_ranking"]

[tool.pytest.ini_options]
testpaths = ["../../tests/global_ranking"]
