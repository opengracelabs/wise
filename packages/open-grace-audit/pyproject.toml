[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-grace-audit"
version = "1.0.0"
description = "Open Grace Audit Registry and evidence trail (v1)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "open-grace-governance",
    "open-grace-agent-registry",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/open_grace_audit"]

[tool.pytest.ini_options]
testpaths = ["../../tests/open_grace"]
