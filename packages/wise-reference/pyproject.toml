[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-reference"
version = "0.1.0"
description = "Reference Capability 1 data models and migrations (architecture-v1.0)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "geoalchemy2>=0.15",
    "psycopg[binary]>=3.1",
    "wise-contracts",
    "wise-registry",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "wise-registry",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_reference"]

[tool.pytest.ini_options]
testpaths = ["../../tests/reference"]
markers = [
    "integration: requires PostgreSQL (WISE_TEST_DATABASE_URL)",
]
