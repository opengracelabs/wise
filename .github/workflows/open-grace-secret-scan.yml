name: Open Grace Secret Scan

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/open-grace-**"
      - "apps/open-grace-registry/**"
      - ".github/workflows/open-grace-secret-scan.yml"

jobs:
  secret-scan-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Placeholder secret scan
        run: |
          echo "Open Grace secret scan placeholder — integrate gitleaks or GitHub secret scanning."
          echo "Scanning packages/open-grace-* and apps/open-grace-registry for obvious patterns..."
          ! rg -n "(api[_-]?key|secret|password)\s*=\s*['\"][^'\"]{8,}" \
            packages/open-grace-* apps/open-grace-registry \
            --glob '!**/*.md' --glob '!**/package-lock.json' || \
            (echo "Potential secret pattern found — review required" && exit 1)
          echo "No obvious inline secret patterns detected."
