[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wise-portfolio-intelligence"
version = "0.1.0"
description = "Portfolio Intelligence selection for balanced global WISE asset mixes (architecture-v1.0)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wise_portfolio_intelligence"]

[tool.pytest.ini_options]
testpaths = ["../../tests/portfolio_intelligence"]
